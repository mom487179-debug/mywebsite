<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 2 Monthsนะที่รัก 💖</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
    overflow:hidden;
}

button{
    margin-top:40vh;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

#content{
    display:none;
}

.gift{
    font-size:80px;
    margin-top:20px;
}

.slider img{
    width:80%;
    max-width:300px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h1{
    margin-top:20px;
}

p{
    font-size:18px;
}
</style>
</head>

<body>

<button id="startBtn">กดสิคะแฟนเค้าา 💖</button>

<div id="content">

<div class="gift">🎁</div>

<div class="slider">
    <img id="slide" src="img1.jpg">
</div>

<h1>Happy 2 Months 💕</h1>
<p>ขอบคุณที่อยู่ด้วยกันนะ เค้ารักเหมยมากๆเลยเย้เย้แบร่ๆ 💖</p>

</div>

<!-- 🎵 เพลงซึ้ง -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9f1f6b7c6e.mp3?filename=romantic-piano-11058.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("startBtn");
const content = document.getElementById("content");
const music = document.getElementById("music");
const slide = document.getElementById("slide");

// 🔥 สำคัญ: ต้องตรงกับชื่อไฟล์ใน GitHub
const images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

let i = 0;

btn.onclick = () => {
    btn.style.display = "none";
    content.style.display = "block";
    music.play();

    setInterval(()=>{
        i = (i+1) % images.length;
        slide.src = images[i];
    },2000);
};
</script>

</body>
</html>
