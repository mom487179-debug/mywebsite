<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy 2 Months 💖</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

/* ปุ่ม */
button{
    margin-top:40vh;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

/* ซ่อน */
.hidden{
    display:none;
}

/* กล่องข้อความ */
#textBox{
    margin-top:30vh;
    font-size:20px;
    padding:20px;
}

/* รูป */
.slider img{
    width:80%;
    max-width:300px;
    border-radius:20px;
    margin-top:20px;
}

/* หัวใจ */
.heart{
    position:fixed;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- หน้า 1 -->
<button id="startBtn">กดสิคะแฟนเค้าา 💖</button>

<!-- หน้า 2 (ข้อความ) -->
<div id="page2" class="hidden">
    <div id="textBox"></div>
    <button id="nextBtn" class="hidden">ไปต่อ 💕</button>
</div>

<!-- หน้า 3 (รูป) -->
<div id="page3" class="hidden">
    <h1>Happy 2 Months 💕</h1>
    <img id="slide" src="img1.jpg.JPG">
</div>

<!-- เพลง -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9f1f6b7c6e.mp3?filename=romantic-piano-11058.mp3" type="audio/mpeg">
</audio>

<script>
const startBtn = document.getElementById("startBtn");
const page2 = document.getElementById("page2");
const page3 = document.getElementById("page3");
const textBox = document.getElementById("textBox");
const nextBtn = document.getElementById("nextBtn");
const music = document.getElementById("music");
const slide = document.getElementById("slide");

const message = "เหมยคะ 2เดือนแล้วนะ โมรักเหมยน๊าา ไอคนเก่งของเค้า ถึงจะทะเลาะกันบ้าง ตีกันบ่อย แต่รักมากเลยนะรู้มั้ย โมไม่อยากให้เหมยจากไปไหน เหมยอยู่กับโมแบบนี้ไปนานๆนะคะ โมรักเหมยนะ 💗";

let i = 0;

// รูป (ต้องตรงกับ GitHub)
const images = ["img1.jpg.JPG","img2.jpg.JPG","img3.jpg.JPG","img4.jpg.JPG"];
let imgIndex = 0;

// เริ่ม
startBtn.onclick = () => {
    startBtn.classList.add("hidden");
    page2.classList.remove("hidden");
    music.play();
    typeText();
};

// พิมพ์ทีละตัว
function typeText(){
    if(i < message.length){
        textBox.innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText,50);
    } else {
        nextBtn.classList.remove("hidden");
    }
}

// ไปหน้ารูป
nextBtn.onclick = () => {
    page2.classList.add("hidden");
    page3.classList.remove("hidden");

    setInterval(()=>{
        imgIndex = (imgIndex+1) % images.length;
        slide.src = images[imgIndex];
    },2000);

    createHearts();
};

// หัวใจลอย
function createHearts(){
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💖";
        heart.style.left=Math.random()*100+"vw";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),5000);
    },300);
}
</script>

</body>
</html>
