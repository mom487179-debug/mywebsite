<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WHATBOT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ---------------- GLOBAL ---------------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

/* ---------------- NAVBAR ---------------- */

nav{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

nav h1{
color:#5865F2;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

/* ---------------- HERO ---------------- */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(270deg,#000,#111,#000);
background-size:400% 400%;
animation:bgmove 15s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero h2{
font-size:60px;
text-shadow:0 0 20px #5865F2;
}

.hero p{
margin-top:10px;
opacity:0.7;
}

/* ---------------- BUTTONS ---------------- */

.buttons{
margin-top:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.invite{
background:#5865F2;
color:white;
box-shadow:0 0 20px #5865F2;
}

.invite:hover{
transform:scale(1.1);
box-shadow:0 0 40px #5865F2;
}

.discord{
background:#222;
color:white;
border:1px solid #5865F2;
}

.discord:hover{
background:#5865F2;
}

.social{
background:#111;
color:white;
border:1px solid #555;
}

.social:hover{
background:#444;
}

/* ---------------- BANNER ---------------- */

.banner{
width:100%;
height:350px;
background:url("https://cdn.discordapp.com/attachments/1423321407420371035/1481354050992734402/IMG_4587.jpg?ex=69b5a4f7&is=69b45377&hm=19338b653735b97bec7ad79c897d69e4c642721825696c417108ff5fad81cacf&") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
}

.banner h3{
font-size:40px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}

/* ---------------- FEATURES ---------------- */

.features{
padding:100px 20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.feature{
width:250px;
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.feature:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #5865F2;
}

.feature h3{
margin-bottom:10px;
}

/* ---------------- SOCIAL SECTION ---------------- */

.social-section{
text-align:center;
padding:80px 20px;
}

.social-links a{
display:inline-block;
margin:10px;
padding:12px 25px;
background:#111;
border-radius:10px;
text-decoration:none;
color:white;
border:1px solid #333;
}

.social-links a:hover{
background:#5865F2;
}

/* ---------------- FOOTER ---------------- */

footer{
text-align:center;
padding:30px;
background:#111;
opacity:0.7;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

.hero h2{
font-size:40px;
}

nav{
padding:10px 20px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<h1>WHATBOT</h1>

<div>

<a href="#">Home</a>
<a href="#features">Features</a>
<a href="#social">Social</a>

</div>

</nav>

<!-- HERO -->

<section class="hero">

<h2>WHATBOT</h2>

<p>บอทกิจกรรมสุดมันสำหรับ Discord</p>

<div class="buttons">

<a href="https://discord.com/oauth2/authorize?client_id=1432715109913858078&permissions=8&scope=bot" target="_blank">
<button class="invite">➕ เพิ่มบอท</button>
</a>

<a href="https://discord.gg/whatdiwaa" target="_blank">
<button class="discord">💬 เข้า Discord</button>
</a>

</div>

</section>

<!-- BANNER -->

<div class="banner">

<h3>Welcome to WHATBOT</h3>

</div>

<!-- FEATURES -->

<section class="features" id="features">

<div class="feature">
<h3>⚡ เร็ว</h3>
<p>คำสั่งทำงานรวดเร็ว</p>
</div>

<div class="feature">
<h3>🎮 เกม</h3>
<p>มีกิจกรรมสนุกมากมาย</p>
</div>

<div class="feature">
<h3>🛡 ปลอดภัย</h3>
<p>ระบบป้องกันสแปม</p>
</div>

<div class="feature">
<h3>🤖 ใช้ง่าย</h3>
<p>คำสั่งเข้าใจง่าย</p>
</div>

</section>

<!-- SOCIAL -->

<section class="social-section" id="social">

<h2>ติดตามเรา</h2>

<div class="social-links">

<a href="https://www.instagram.com/whatofficial.gg?igsh=cjZtY29zaTY5bzA0">📸 แอคไอจีวอท</a>

<a href="https://www.instagram.com/angelwhatttt?igsh=dHpiNDJqY3Z0N2Rs">🎥 แอคไอจีแองเจิ้ลวอท</a>

<a href="https://discord.gg/whatdiwaa">💬 Discord</a>

</div>

</section>

<footer>

WHATBOT © 2026

</footer>

</body>
</html>
