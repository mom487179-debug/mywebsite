<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WHATBOT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(270deg,#0f0c29,#302b63,#24243e);
background-size:600% 600%;
animation:bgmove 15s infinite;
color:white;
overflow-x:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://cdn.discordapp.com/attachments/1423321407420371035/1481354050992734402/IMG_4587.jpg?ex=69b5a4f7&is=69b45377&hm=19338b653735b97bec7ad79c897d69e4c642721825696c417108ff5fad81cacf&");
opacity:0.3;
z-index:-1;
}

nav{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
color:#5865F2;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero img{
width:120px;
border-radius:50%;
box-shadow:0 0 20px #5865F2;
margin-bottom:20px;
}

.hero h2{
font-size:55px;
text-shadow:0 0 20px #5865F2;
}

.hero p{
opacity:0.7;
margin-top:10px;
}

.buttons{
margin-top:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

.invite{
background:#5865F2;
color:white;
box-shadow:0 0 20px #5865F2;
}

.invite:hover{
transform:scale(1.1);
}

.discord{
background:#222;
color:white;
border:1px solid #5865F2;
}

.discord:hover{
background:#5865F2;
}

.status{
margin-top:20px;
padding:10px 20px;
background:#111;
border-radius:10px;
box-shadow:0 0 10px #5865F2;
}

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:50px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="stars"></div>

<nav>
<h1>WHATBOT</h1>
</nav>

<section class="hero">

<img id="botAvatar" src="">

<h2 id="botName">WHATBOT</h2>

<p>บอทกิจกรรมสุดมันสำหรับ Discord</p>

<div class="buttons">

<a href="https://discord.com/oauth2/authorize?client_id=1432715109913858078&permissions=8&scope=bot" target="_blank">
<button class="invite">➕ เพิ่มบอท</button>
</a>

<a href="https://discord.gg/whatdiwaa" target="_blank">
<button class="discord">💬 เข้า Discord</button>
</a>

</div>

<div class="status">
🤖 สถานะบอท : <span id="botStatus">กำลังโหลด...</span>
</div>

</section>

<footer>
WHATBOT © 2026
</footer>

<script>

const botID = "1432715109913858078"

fetch(`https://discord.com/api/users/${botID}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("botName").innerText=data.username

document.getElementById("botAvatar").src=
`https://cdn.discordapp.com/avatars/${botID}/${data.avatar}.png`

document.getElementById("botStatus").innerHTML="ออนไลน์ 🟢"

})
.catch(()=>{

document.getElementById("botStatus").innerHTML="ออฟไลน์ 🔴"

})

</script>

</body>
</html>
